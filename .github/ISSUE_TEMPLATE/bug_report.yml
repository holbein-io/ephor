name: Bug Report
description: Report something that is not working correctly
labels: ["type/bug", "status/needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below
        so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behaviour.
      placeholder: |
        1. Deploy version X with config ...
        2. Send request to ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Application or chart version (e.g. 0.3.1, commit SHA).
      placeholder: "0.1.0"
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Kubernetes version, browser, JDK, or other relevant runtime info.
      placeholder: "Kubernetes 1.31, OpenJDK 21"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Paste relevant log output or attach screenshots.
      render: text
    validations:
      required: false
