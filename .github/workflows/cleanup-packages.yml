name: Cleanup old package versions

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/delete-package-versions@v5
        with:
          package-name: ephor-scanner
          package-type: container
          min-versions-to-keep: 3
          delete-only-untagged-versions: false
