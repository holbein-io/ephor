global:
  imagePullSecrets: []

api:
  replicaCount: 1
  image:
    registry: ghcr.io
    repository: holbein-io/ephor/api
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 1Gi
  probes:
    startup:
      path: /api/v1/actuator/health/liveness
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 30
    liveness:
      path: /api/v1/actuator/health/liveness
      initialDelaySeconds: 0
      periodSeconds: 10
      failureThreshold: 3
    readiness:
      path: /api/v1/actuator/health/readiness
      initialDelaySeconds: 0
      periodSeconds: 5
      failureThreshold: 3
  auth:
    # IdP logout URL for proper session termination (optional)
    # Example for Keycloak: https://keycloak.example.com/realms/ephor/protocol/openid-connect/logout
    idpLogoutUrl: ""

  userDirectory:
    # Provider: none | internal | keycloak | github
    provider: internal

    # Keycloak provider settings (when provider=keycloak)
    keycloak:
      serverUrl: ""
      realm: ephor
      clientId: ephor-admin
      clientSecret: ""
      existingSecret: ""      # Secret with key 'keycloak-client-secret'
      syncInterval: "900000"   # 15 minutes in ms

    # GitHub provider settings (when provider=github)
    github:
      org: ""
      token: ""
      existingSecret: ""      # Secret with key 'github-token'
      syncInterval: "1800000"  # 30 minutes in ms
      # teamMapping is configured via extraEnv (Spring relaxed binding)

  extraEnv: []
  extraEnvFrom: []

dashboard:
  replicaCount: 1
  image:
    registry: ghcr.io
    repository: holbein-io/ephor/dashboard
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ephor.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: api
        - path: /
          pathType: Prefix
          service: dashboard
  tls: []

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "17-alpine"
  auth:
    database: ephor
    username: ephor
    password: ""
    existingSecret: ""
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 512Mi

externalDatabase:
  host: ""
  port: 5432
  database: ephor
  username: ephor
  password: ""
  existingSecret: ""
