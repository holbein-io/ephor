apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ephor.dashboard.fullname" . }}
  labels:
    {{- include "ephor.dashboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      {{- include "ephor.dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/dashboard/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "ephor.dashboard.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "ephor.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "ephor.podSecurityContext" . | nindent 8 }}
      containers:
        - name: dashboard
          image: {{ include "ephor.dashboard.image" . }}
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          securityContext:
            {{- include "ephor.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "ephor.dashboard.fullname" . }}
